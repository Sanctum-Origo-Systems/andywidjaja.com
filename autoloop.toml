# AutoLoop configuration — generated by autoloop init.
# Values here override dataclass defaults; env vars override these.

repo = "Sanctum-Origo-Systems/andywidjaja.com"

# Models
triage_model = "sonnet"
impl_model = "claude-opus-4-6[1m]"

# Timeouts (seconds)
impl_timeout = 900
triage_timeout = 90
test_timeout = 120

# GitHub
pr_reviewer = "andywidjaja"

# Verification
verify_cmd = "npm run build"

# Retry / truncation limits
max_retries = 3
tree_truncation = 3000
diff_truncation = 8000
error_truncation = 2000
spec_truncation = 4000

# Paths the builder must never modify — issues targeting these get needs-human
protected_paths = ["autoloop/", "autoloop.toml"]

# Labels that indicate an issue has already been triaged.
# To recreate labels manually:
#   gh label create <name> --repo Sanctum-Origo-Systems/andywidjaja.com --color <color> --description "..."
triage_labels = [
    "ready",
    "rejected",
    "needs-decomposition",
    "in-progress",
    "in-review",
    "needs-human",
]
